[Fox_Nano_S3_sx1262]
extends = esp32_base
board = rymcu-esp32-s3-devkitc-1
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
build_flags =
  ${esp32_base.build_flags}
  -I variants/fox_nano_s3
  -D BOARD_HAS_PSRAM
  -D FOX_NANO_S3
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D P_LORA_DIO_1=39
  -D P_LORA_NSS=41
  -D P_LORA_RESET=42
  -D P_LORA_BUSY=40
  -D P_LORA_SCLK=7
  -D P_LORA_MISO=8
  -D P_LORA_MOSI=9
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=8
  -D MAX_LORA_TX_POWER=22
  -D SX126X_RX_BOOSTED_GAIN=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/fox_nano_s3>
lib_deps =
  ${esp32_base.lib_deps}

[env:Fox_Nano_S3_sx1262_repeater]
extends = Fox_Nano_S3_sx1262
build_flags =
  ${Fox_Nano_S3_sx1262.build_flags}
  -D ADVERT_NAME='"fox-nano-s3 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Fox_Nano_S3_sx1262.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${Fox_Nano_S3_sx1262.lib_deps}
  ${esp32_ota.lib_deps}

[env:Fox_Nano_S3_sx1262_room_server]
extends = Fox_Nano_S3_sx1262
build_flags =
  ${Fox_Nano_S3_sx1262.build_flags}
  -D ADVERT_NAME='"fox-nano-s3 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Fox_Nano_S3_sx1262.build_src_filter}
  +<../examples/simple_room_server>
lib_deps =
  ${Fox_Nano_S3_sx1262.lib_deps}
  ${esp32_ota.lib_deps}

[env:Fox_Nano_S3_sx1262_companion_radio_usb]
extends = Fox_Nano_S3_sx1262
build_flags =
  ${Fox_Nano_S3_sx1262.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Fox_Nano_S3_sx1262.build_src_filter}
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${Fox_Nano_S3_sx1262.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:Fox_Nano_S3_sx1262_companion_radio_ble]
extends = Fox_Nano_S3_sx1262
build_flags =
  ${Fox_Nano_S3_sx1262.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Fox_Nano_S3_sx1262.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${Fox_Nano_S3_sx1262.lib_deps}
  densaugeo/base64 @ ~1.4.0
