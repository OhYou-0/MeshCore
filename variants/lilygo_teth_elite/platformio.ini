[env:LilyGo_TETH_Elite_sx1262_repeater_bridge_espnow]
extends = LilyGo_TETH_Elite_sx1262_eth
build_flags =
  ${LilyGo_TETH_Elite_sx1262_eth.build_flags}
  -D ADVERT_NAME='"ESPNow Bridge"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_ESPNOW_BRIDGE=1
  -D MESH_PACKET_LOGGING=1
;  -D BRIDGE_DEBUG=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGo_TETH_Elite_sx1262_eth.build_src_filter}
  +<helpers/bridges/ESPNowBridge.cpp>
  +<../examples/simple_repeater>

[env:LilyGo_TETH_Elite_sx1262_terminal_chat]
extends = LilyGo_TETH_Elite_sx1262
build_flags =
  ${LilyGo_TETH_Elite_sx1262.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGo_TETH_Elite_sx1262.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps =
  ${LilyGo_TETH_Elite_sx1262.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:LilyGo_TETH_Elite_sx1262_room_server]
extends = LilyGo_TETH_Elite_sx1262_eth
build_flags =
  ${LilyGo_TETH_Elite_sx1262_eth.build_flags}
  -D ADVERT_NAME='"T-ETH Elite Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGo_TETH_Elite_sx1262_eth.build_src_filter}
  +<../examples/simple_room_server>

[env:LilyGo_TETH_Elite_sx1262_companion_radio_usb]
extends = LilyGo_TETH_Elite_sx1262
build_flags =
  ${LilyGo_TETH_Elite_sx1262.build_flags}
  -I examples/companion_radio/ui-orig
  -D DISPLAY_CLASS=NullDisplayDriver
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
; NOTE: DO NOT ENABLE -->  -D MESH_PACKET_LOGGING=1
; NOTE: DO NOT ENABLE -->  -D MESH_DEBUG=1
build_src_filter = ${LilyGo_TETH_Elite_sx1262.build_src_filter}
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-orig/*.cpp>
lib_deps =
  ${LilyGo_TETH_Elite_sx1262.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:LilyGo_TETH_Elite_sx1262_companion_radio_ble]
extends = LilyGo_TETH_Elite_sx1262
build_flags =
  ${LilyGo_TETH_Elite_sx1262.build_flags}
  -I examples/companion_radio/ui-orig
  -D DISPLAY_CLASS=NullDisplayDriver
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGo_TETH_Elite_sx1262.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-orig/*.cpp>
lib_deps =
  ${LilyGo_TETH_Elite_sx1262.lib_deps}
  densaugeo/base64 @ ~1.4.0
