[LilyGo_TETH_Elite_sx1262]
extends = esp32_base
board = esp32s3box
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
  ${esp32_base.build_flags}
  -I variants/lilygo_teth_elite
  -D BOARD_HAS_PSRAM
  -D LILYGO_TETH_ELITE
  -D LILYGO_T_ETH_ELITE_ESP32S3
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D P_LORA_DIO_1=8
  -D P_LORA_NSS=40
  -D P_LORA_RESET=46   ; RADIOLIB_NC
  -D P_LORA_BUSY=16
  -D P_LORA_SCLK=10
  -D P_LORA_MISO=9
  -D P_LORA_MOSI=11
  -D P_LORA_TX_LED=38
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_RX_BOOSTED_GAIN=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/lilygo_teth_elite>
lib_deps = ${esp32_base.lib_deps}

[LilyGo_TETH_Elite_sx1262_eth]
extends = LilyGo_TETH_Elite_sx1262
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13-1/platform-espressif32.zip
build_flags =
  ${LilyGo_TETH_Elite_sx1262.build_flags}
  -D MESH_ETHERNET_WEB=1
  -D DISABLE_WIFI_OTA=1
  -D ETH_PHY_TYPE=ETH_PHY_W5500
  -D ETH_PHY_ADDR=1
  -D P_ETH_SCLK=48
  -D P_ETH_MISO=47
  -D P_ETH_MOSI=21
  -D P_ETH_CS=45
  -D P_ETH_IRQ=14
  -D P_ETH_RST=-1
lib_deps =
  ${LilyGo_TETH_Elite_sx1262.lib_deps}
  me-no-dev/ESPAsyncWebServer @ ^3.6.0

; === LilyGo T-ETH Elite with SX1262 environments ===
[env:LilyGo_TETH_Elite_sx1262_repeater]
extends = LilyGo_TETH_Elite_sx1262_eth
build_flags =
  ${LilyGo_TETH_Elite_sx1262_eth.build_flags}
  -D ADVERT_NAME='"T-ETH Elite Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${LilyGo_TETH_Elite_sx1262_eth.build_src_filter}
  +<../examples/simple_repeater>

