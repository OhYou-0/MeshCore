name: Build LilyGo T-ETH Elite Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'lilygo-teth-elite-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: >-
          /usr/bin/env bash build.sh build-firmware
          LilyGo_TETH_Elite_sx1262_repeater
          LilyGo_TETH_Elite_sx1262_room_server
          LilyGo_TETH_Elite_sx1262_terminal_chat
          LilyGo_TETH_Elite_sx1262_companion_radio_usb
          LilyGo_TETH_Elite_sx1262_companion_radio_ble

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lilygo-teth-elite-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: LilyGo T-ETH Elite Firmware ${{ env.GIT_TAG_VERSION }}
          body: |
            Included targets:
            - LilyGo_TETH_Elite_sx1262_repeater
            - LilyGo_TETH_Elite_sx1262_room_server
            - LilyGo_TETH_Elite_sx1262_terminal_chat
            - LilyGo_TETH_Elite_sx1262_companion_radio_usb
            - LilyGo_TETH_Elite_sx1262_companion_radio_ble
          draft: false
          files: out/*
